<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="event.css">
    <title>Event Handler </title>
  </head>
  <body>
    <h1 class="main-heading">Main Heading</h1>

    <div id="list">
      
      <button onclick="makeBlue ()">Turn Blue</button>
      <button onclick="makeGray ()">Turn Gray</button>
      <button onclick="makeYellow ()">Turn Yellow</button>
    </div>

    <section id="card-section">
      <h1 class="section-heading">Card Section</h1>

      <div class="card-box">
        <div class="card">
          <h2>Card 1</h2>
          <p>This is first card</p>
        </div>

        <div class="card">
          <h2>Card 2</h2>
          <p>This is second card</p>
        </div>

        <div class="card">
          <h2>Card 3</h2>
          <p>This is third card</p>
        </div>
      </div>
    </section>

    <!-- external js -->
    <script src="./event.js"></script>
  </body>
</html>
