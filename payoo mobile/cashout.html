<!doctype html>
<html lang="en" data-="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo || Cashout</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="custom.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <header class="border-b-2 border-gray-300 sticky top-0">
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="left flex gap-1">
          <div class="w-[60px]">
            <img src="./assets/logo.png" alt="" />
          </div>
          <div class="balance-info">
            <h2 class="text-2xl font-bold">
              $ <span id="balance">45000</span>
            </h2>
            <p class="text-neutral/50">Available Balance</p>
          </div>
        </div>
        <div class="right">
          <a href="./index.html" class="btn"
            ><i class="fa-solid fa-right-from-bracket"></i>Log Out</a
          >
        </div>
      </section>
    </header>
    <section class="w-11/12 mx-auto mt-8 mb-6 space-y-5">
      <h2 class="text-2xl font-bold">
        Welcome to Pay<span class="text-primary/80">oo</span>
      </h2>
      <p class="text-neutral/50">
        Enjoy easy and convenient financial services with us. Cashout charge is
        and
      </p>

      <div class="buttons grid grid-cols-3 gap-3">
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
          <img src="./assets/opt-1.png" alt="add money button" />
          <p class="text-sm font-normal text-neutral/50">Add Money</p>
        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-outline active">
          <img src="./assets/opt-2.png" alt="add money button" />
          <p class="text-sm font-normal text-neutral/50">Cashout</p>
        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-soft p-1">
          <img src="./assets/opt-3.png" alt="add money button" />
          <p class="text-sm font-normal text-neutral/50">Transfer Money</p>
        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
          <img src="./assets/opt-4.png" alt="add money button" />
          <p class="text-sm font-normal text-neutral/50">Get Bonus</p>
        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
          <img src="./assets/opt-5.png" alt="add money button" />
          <p class="text-sm font-normal text-neutral/50">Pay Bill</p>
        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
          <img src="./assets/opt-6.png" alt="add money button" />
          <p class="text-sm font-normal text-neutral/50">Transactions</p>
        </button>
      </div>
    </section>
    <section class="w-11/12 mx-auto py-5">
      <h2 class="text-xl font-bold mb-4">Cash Out</h2>
      <div
        class="card bg-base-100 w-full shadow rounded-2xl"
      >
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-neutral/70 font-medium text-base">Agent Number</label>
            <input
              id="agent-number"
              type="text"
              maxlength="11"
              minlength="11"
              class="input rounded-full bg-base-200 border-0 w-full"
              placeholder="Enter 11 digit number"
            />
            <br>
            <label class="label text-neutral/70 font-medium text-base">Amount</label>
            <input
              id="withdraw-amount"
              type="text"
              maxlength="5"
              minlength="2"
              class="input rounded-full bg-base-200 border-0 w-full"
              placeholder="Enter Amount to withdraw"
            />
            <br />
            <label class="label text-neutral/70 font-medium text-base">Pin Number</label>
            <input
              id="withdraw-pin"
              maxlength="4"
              minlength="4"
              type="text"
              class="input rounded-full bg-base-200 border-0 w-full"
              placeholder="Enter your 4 Digit Pin"
            />
            <button id="withdraw-btn" class="btn btn-primary rounded-full mt-4">
              WithDraw Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>
    <script src="./scripts/cashOut.js"></script>
  </body>
</html>
